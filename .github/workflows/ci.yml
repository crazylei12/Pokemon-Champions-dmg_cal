name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            external/smogon-damage-calc/calc/package-lock.json

      - name: Install project dependencies
        run: npm ci

      - name: Install and build the pinned damage engine
        run: |
          npm ci --prefix external/smogon-damage-calc
          npm ci --prefix external/smogon-damage-calc/calc

      - name: Type-check and run engine regressions
        run: npm test
